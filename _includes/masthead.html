{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <nav class="site-nav-static" aria-label="Primary">
      <ul class="site-nav-static__links">
        <li class="site-nav-static__brand"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
          <li class="site-nav-static__item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
      </ul>
    </nav>
  </div>
</div>
