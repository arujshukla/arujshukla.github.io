<script src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var siteOrigin = "{{ site.url | default: '' }}";
    var siteHost = "";

    try {
      siteHost = siteOrigin ? new URL(siteOrigin).hostname : "";
    } catch (error) {
      siteHost = "";
    }

    function isAssetLink(pathname) {
      return (
        pathname.indexOf("/files/") === 0 ||
        /\.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|csv|txt|png|jpe?g|gif|webp|svg|mp3|mp4|mov)$/i.test(pathname)
      );
    }

    function isSameSite(url, href) {
      if (/^(\/(?!\/)|\.\/|\.\.\/)/.test(href)) return true;
      if (!/^https?:/i.test(url.protocol)) return false;
      if (url.hostname === window.location.hostname) return true;
      if (siteHost && url.hostname === siteHost) return true;
      return false;
    }

    document.querySelectorAll('a[href]').forEach(function (link) {
      var href = link.getAttribute("href");
      var url;
      var isInternal;
      var isAsset;

      if (!href || href.charAt(0) === "#" || href.indexOf("javascript:") === 0) return;

      try {
        url = new URL(href, window.location.origin);
      } catch (error) {
        return;
      }

      isInternal = isSameSite(url, href);
      isAsset = isInternal && isAssetLink(url.pathname);

      if (/^(mailto:|tel:)/i.test(href) || (!isInternal && /^https?:/i.test(url.protocol)) || isAsset) {
        link.setAttribute("target", "_blank");
        link.setAttribute("rel", "noopener noreferrer");
      } else {
        link.removeAttribute("target");
        link.removeAttribute("rel");
      }
    });

    document.querySelectorAll('.research-entry__links a[href^="#abstract-"]').forEach(function (link) {
      link.addEventListener("click", function (event) {
        var target = document.querySelector(this.getAttribute("href"));
        if (!target) return;
        event.preventDefault();
        target.open = !target.open;
        if (target.open) {
          target.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      });
    });
  });
</script>
